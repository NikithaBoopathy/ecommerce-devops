apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
       labels:
         app: user-service
    spec:
       containers:
        - name: user-service-img
          image: nikithaboopathy/ecommerce-user-service:v1
          ports:
           - containerPort: 8081   
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-service:5432/ecommerce"
